<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Password Generator Preview</title>
    <link rel="icon" type="image/png" href="/icons/icon-128.png" />
    <script>
      (function () {
        var store = { history: false, pwds: [], theme: "dark", excludeAmbiguous: false };
        window.chrome = {
          storage: {
            sync: {
              get: function (keys, cb) {
                var keyList = Array.isArray(keys) ? keys : [keys];
                var result = {};
                keyList.forEach(function (key) {
                  if (key in store) result[key] = store[key];
                });
                cb(result);
              },
              set: function (data, cb) {
                Object.assign(store, data);
                if (cb) cb();
              },
            },
          },
          runtime: {
            onMessage: {
              addListener: function () {},
              removeListener: function () {},
            },
          },
        };
      })();
    </script>
  </head>
  <body>
    <script defer src="index.js"></script>
  </body>
</html>
