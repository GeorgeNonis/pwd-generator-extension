<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Store capture frame</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1280px;
        height: 800px;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .frame {
        width: 1280px;
        height: 800px;
        background: radial-gradient(circle at 20% 20%, #312e81 0%, #121214 55%, #0a0a0b 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        padding: 2rem;
      }
      .frame.light {
        background: radial-gradient(circle at 20% 20%, #e0e7ff 0%, #f4f4f5 55%, #e4e4e7 100%);
      }
      .caption {
        color: #f4f4f5;
        font-size: 1.75rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .frame.light .caption { color: #18181b; }
      .subcaption {
        color: #a1a1aa;
        font-size: 1rem;
        margin-top: -0.75rem;
      }
      .frame.light .subcaption { color: #71717a; }
      .popup-slot {
        width: 23rem;
        height: 32rem;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.45);
      }
      iframe {
        width: 23rem;
        height: 32rem;
        border: 0;
        display: block;
      }
    </style>
    <script>
      window.chrome = {
        storage: {
          sync: {
            get: function (keys, cb) {
              var store = {
                history: true,
                pwds: ["Kx9#mP2$vL8nQ4!", "WiFi-2024-Secure", "482910"],
                theme: "dark",
                excludeAmbiguous: false,
              };
              var keyList = Array.isArray(keys) ? keys : [keys];
              var result = {};
              keyList.forEach(function (key) {
                if (key in store) result[key] = store[key];
              });
              cb(result);
            },
            set: function (data, cb) { if (cb) cb(); },
          },
        },
        runtime: {
          onMessage: { addListener: function () {}, removeListener: function () {} },
        },
      };
    </script>
  </head>
  <body>
    <div class="frame" id="frame">
      <div class="caption" id="caption">Password Generator</div>
      <div class="subcaption" id="subcaption">Secure passwords, one click</div>
      <div class="popup-slot">
        <iframe id="app" src="preview.html"></iframe>
      </div>
    </div>
    <script>
      const params = new URLSearchParams(location.search);
      const caption = params.get("caption");
      const sub = params.get("sub");
      const theme = params.get("theme");
      if (caption) document.getElementById("caption").textContent = caption;
      if (sub) document.getElementById("subcaption").textContent = sub;
      if (theme === "light") document.getElementById("frame").classList.add("light");
    </script>
  </body>
</html>
