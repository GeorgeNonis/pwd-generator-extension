<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Small promo tile</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 440px;
        height: 280px;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .tile {
        width: 440px;
        height: 280px;
        background: radial-gradient(circle at 18% 22%, #312e81 0%, #121214 52%, #0a0a0b 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.125rem;
        padding: 1.5rem;
        position: relative;
      }
      .tile::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 60% 50% at 85% 80%, rgba(99, 102, 241, 0.18) 0%, transparent 70%);
        pointer-events: none;
      }
      .icon {
        width: 72px;
        height: 72px;
        border-radius: 16px;
        box-shadow: 0 8px 32px rgba(99, 102, 241, 0.35);
        position: relative;
        z-index: 1;
      }
      .headline {
        color: #f4f4f5;
        font-size: 1.375rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        text-align: center;
        line-height: 1.25;
        position: relative;
        z-index: 1;
      }
      .headline .accent {
        color: #a5b4fc;
      }
    </style>
  </head>
  <body>
    <div class="tile">
      <img class="icon" src="../../store_assets/icon-128.png" alt="" width="72" height="72" />
      <div class="headline">
        Strong passwords.<br />
        <span class="accent">Zero cloud.</span>
      </div>
    </div>
  </body>
</html>
