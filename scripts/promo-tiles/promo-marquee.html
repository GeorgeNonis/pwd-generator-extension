<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Marquee promo tile</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1400px;
        height: 560px;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      .tile {
        width: 1400px;
        height: 560px;
        background: radial-gradient(circle at 12% 30%, #312e81 0%, #121214 48%, #0a0a0b 100%);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 3.5rem 4rem 3.5rem 5rem;
        position: relative;
        overflow: hidden;
      }
      .tile::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 45% 60% at 92% 50%, rgba(99, 102, 241, 0.22) 0%, transparent 65%);
        pointer-events: none;
      }
      .copy {
        flex: 0 0 520px;
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
        position: relative;
        z-index: 1;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .brand img {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        box-shadow: 0 6px 24px rgba(99, 102, 241, 0.3);
      }
      .brand-name {
        color: #a1a1aa;
        font-size: 1.125rem;
        font-weight: 500;
        letter-spacing: -0.01em;
      }
      .headline {
        color: #f4f4f5;
        font-size: 2.75rem;
        font-weight: 700;
        letter-spacing: -0.035em;
        line-height: 1.15;
      }
      .headline .accent {
        color: #a5b4fc;
      }
      .subline {
        color: #a1a1aa;
        font-size: 1.25rem;
        line-height: 1.5;
        max-width: 28rem;
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 0.625rem;
        margin-top: 0.5rem;
      }
      .tag {
        color: #c7d2fe;
        background: rgba(99, 102, 241, 0.15);
        border: 1px solid rgba(129, 140, 248, 0.35);
        border-radius: 999px;
        padding: 0.375rem 0.875rem;
        font-size: 0.875rem;
        font-weight: 500;
      }
      .preview {
        flex: 0 0 auto;
        position: relative;
        z-index: 1;
        margin-right: -1rem;
      }
      .preview img {
        width: 720px;
        height: auto;
        border-radius: 12px;
        box-shadow: 0 32px 80px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(255, 255, 255, 0.06);
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="tile">
      <div class="copy">
        <div class="brand">
          <img src="../../store_assets/icon-128.png" alt="" width="56" height="56" />
          <span class="brand-name">Password Generator</span>
        </div>
        <h1 class="headline">
          Passwords &amp; passphrases<br />
          <span class="accent">offline &amp; private</span>
        </h1>
        <p class="subline">
          Cryptographically secure generation. Presets, history, and themes — all local in your browser.
        </p>
        <div class="tags">
          <span class="tag">No accounts</span>
          <span class="tag">No analytics</span>
          <span class="tag">Passphrase mode</span>
        </div>
      </div>
      <div class="preview">
        <img
          src="../../store_assets/screenshot-01-generator.png"
          alt=""
          width="720"
        />
      </div>
    </div>
  </body>
</html>
