name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        id: test
        run: npm test 2>&1 | tee test-output.log
        env:
          CI: true

      - name: Build
        id: build
        run: npm run build

      - name: Job summary
        if: always()
        run: |
          {
            echo "## CI — $(date -u +'%Y-%m-%d %H:%M UTC')"
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Test | ${{ steps.test.outcome }} |"
            echo "| Build | ${{ steps.build.outcome }} |"
            echo ""
            echo "[View full logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
          retention-days: 7
